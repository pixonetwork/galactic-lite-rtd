<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALACTIC // LITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00f2ff;
            --neon-glow: rgba(0, 242, 255, 0.7);
            --bg: #010101;
            --border: rgba(0, 242, 255, 0.3);
            --card-bg: #050505;
            --success: #39ff14;
            --success-glow: rgba(57, 255, 20, 0.5);
            --error: #ff3333;
        }

        /* --- ORBITRON BLACK PROTOCOL --- */
        * { 
            font-family: 'Orbitron', sans-serif !important; 
            font-weight: 900 !important; 
            text-transform: uppercase;
            box-sizing: border-box; 
            letter-spacing: 1.5px;
        }

        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: #fff; overflow: hidden; }
        canvas#bg-canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

        /* --- EMERGENCY BACKUP BANNER --- */
        #top-banner {
            position: fixed; top: 0; left: 0; width: 100%; height: 40px;
            background: #400; color: #fff; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; border-bottom: 2px solid var(--error);
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); gap: 15px;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.3s;
        }
        #top-banner.stealth { transform: translateY(-100%); opacity: 0; pointer-events: none; }

        .btn-backup {
            background: var(--success); color: #000; border: none;
            padding: 5px 15px; font-size: 10px; cursor: pointer;
            text-decoration: none; border-radius: 2px;
            box-shadow: 0 0 15px var(--success-glow); font-weight: 900;
        }
        .pointing-arrow {
            font-size: 18px; color: var(--success);
            animation: arrow-point 0.5s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes arrow-point {
            0% { transform: translateX(0); opacity: 0.3; }
            100% { transform: translateX(12px); opacity: 1; }
        }
        .banner-close {
            position: absolute; right: 20px; cursor: pointer; color: #fff;
            border: 1px solid #fff; padding: 2px 8px; font-size: 12px; transition: 0.3s;
        }
        .banner-close:hover { background: #fff; color: #000; }

        /* --- LOGO --- */
        .logo-container { display: inline-flex; align-items: center; gap: 0px; cursor: pointer; }
        .logo-main { font-size: 2rem; letter-spacing: 10px; color: var(--neon); text-shadow: 0 0 30px var(--neon); line-height: 1; }
        .logo-lite-box {
            background: var(--neon); color: #000; font-size: 9px; padding: 3px 7px;
            transform: rotate(90deg); margin-left: -8px;
            box-shadow: 0 0 20px var(--neon); white-space: nowrap; height: 14px;
            display: flex; align-items: center; justify-content: center;
        }

        /* --- UI WRAPPER --- */
        .master-wrapper {
            display: flex; flex-direction: column; height: 100vh;
            padding-top: 40px; 
            max-width: 1400px; margin-left: auto; margin-right: auto;
            border-left: 1px solid var(--border); border-right: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.92); backdrop-filter: blur(25px);
            transition: padding-top 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .master-wrapper.full { padding-top: 0; }

        .header { padding: 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 100; }

        /* --- CONTROLS --- */
        .controls-area {
            padding: 20px 30px; display: flex; gap: 15px; align-items: center;
            background: rgba(5, 5, 5, 0.9); border-bottom: 1px solid var(--border);
            position: relative; z-index: 100;
        }
        #search-input { flex: 1; background: #000; border: 2px solid var(--border); padding: 15px 25px; color: var(--neon); outline: none; font-size: 13px; }

        .slider-wrap { display: flex; align-items: center; gap: 10px; font-size: 9px; color: var(--neon); }
        .switch { position: relative; display: inline-block; width: 44px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; border: 1px solid var(--neon); transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 3px; background-color: var(--neon); transition: .4s; box-shadow: 0 0 10px var(--neon); }
        input:checked + .slider:before { transform: translateX(22px); background-color: var(--success); box-shadow: 0 0 10px var(--success); }
        input:checked + .slider { border-color: var(--success); }

        .btn-tactic {
            background: transparent; border: 2px solid var(--success); color: var(--success);
            padding: 0 20px; cursor: pointer; font-size: 10px; transition: 0.3s;
            position: relative; overflow: hidden; height: 45px;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-tactic:hover { background: var(--success); color: #000; box-shadow: 0 0 30px var(--success-glow); }
        .btn-white { border-color: #fff; color: #fff; }
        .btn-white:hover { background: #fff; color: #000; box-shadow: 0 0 30px rgba(255, 255, 255, 0.5); }
        .btn-exit { border-color: var(--error); color: var(--error); }
        .btn-exit:hover { background: var(--error); color: #000; box-shadow: 0 0 30px rgba(255, 51, 51, 0.6); }

        .shine-effect::before {
            content: ""; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg); transition: 0s;
        }
        .shine-effect:hover::before { left: 150%; transition: 0.5s ease-in-out; }

        /* --- GRID --- */
        .grid-container { flex: 1; overflow-y: auto; padding: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; position: relative; z-index: 1; }
        .game-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 20px; text-align: center; cursor: pointer;
            transition: 0.2s ease-out; position: relative;
            width: 100%; height: 95px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .game-card:hover { border-color: var(--neon); transform: translateY(-4px); box-shadow: 0 0 25px var(--neon-glow); z-index: 10; }
        .game-card.favorite { border-left: 6px solid var(--success); }
        .game-name { font-size: 10px; color: #fff; line-height: 1.3; margin-bottom: 5px; }
        .part-tag { font-size: 5px; color: var(--neon); opacity: 0.6; letter-spacing: 1.5px; }
        .pin-status { font-size: 5px; color: #fff; margin-top: 4px; opacity: 0.8; letter-spacing: 2px; }
        .fav-star { position: absolute; top: 8px; left: 8px; font-size: 22px; color: #fff; z-index: 5; transition: 0.2s; text-shadow: 0 0 5px #000; }
        .game-card.favorite .fav-star { color: var(--success); text-shadow: 0 0 10px var(--success-glow); }

        /* --- THEATER & LOADERS --- */
        #theater { position: fixed; inset: 0; background: #000; z-index: 9000; display: none; flex-direction: column; }
        #theater.active { display: flex; }
        .theater-head { padding: 10px 25px; background: #080808; border-bottom: 2px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .theater-body { flex: 1; position: relative; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; display: block; background: #000; }

        .loader-ui { position: absolute; inset: 0; background: #000; z-index: 9100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .bar-container { 
            width: 550px; height: 35px; background: #050505; border: 2px solid var(--border); 
            overflow: hidden; margin-top: 20px; position: relative;
        }
        .bar-fill { width: 0%; height: 100%; background: var(--neon); transition: 0.1s; position: relative; }
        .bar-fill.kinetic-slide {
            width: 35% !important; position: absolute; background: #00f2ff;
            box-shadow: 0 0 40px var(--neon), inset 0 0 10px #fff;
            animation: kinetic-slide-run 0.8s infinite ease-in-out;
        }
        @keyframes kinetic-slide-run { 0% { left: -35%; } 100% { left: 100%; } }

        .msg-text { font-size: 14px; color: var(--neon); margin-top: 30px; text-shadow: 0 0 20px var(--neon); }
        .stream-monitor { margin-top: 30px; width: 550px; max-height: 200px; overflow-y: auto; border-top: 1px solid var(--border); padding-top: 15px; }
        .stream-item { display: flex; justify-content: space-between; font-size: 10px; color: #444; margin-bottom: 8px; }
        .stream-item.active { color: var(--neon); }
        .stream-item.complete { color: var(--success); }

        #splash { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.6s cubic-bezier(0.7, 0, 0.3, 1); }
        #splash.hidden { transform: translateY(-100%); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div id="top-banner">
        <span>STATION_STATUS: OFFLINE? ACCESS_RESERVE_NODE</span>
        <span class="pointing-arrow">➤</span>
        <a href="https://docs.google.com/document/d/167pb8PZVCSGdGN19Iay3Fxlu5O0HwuhCGcomZ5lyKdA/" target="_blank" class="btn-backup">OPEN_BACKUPS</a>
        <div class="banner-close" onclick="dismissBanner(true)">X</div>
    </div>

    <div id="splash">
        <div class="logo-container" style="transform:scale(2); margin-bottom:120px;">
            <div class="logo-main">GALACTIC</div><div class="logo-lite-box">LITE</div>
        </div>
        <div class="loader-ui" style="position:relative; background:transparent;">
            <div class="bar-container"><div id="splash-bar" class="bar-fill kinetic-slide"></div></div>
            <div id="splash-msg" class="msg-text">DECRYPTING_DATABASE...</div>
        </div>
    </div>

    <div class="master-wrapper" id="main-wrap">
        <div class="header">
            <div class="logo-container" onclick="location.reload()"><div class="logo-main">GALACTIC</div><div class="logo-lite-box">LITE</div></div>
            <div id="node-count" style="font-size: 11px; color: var(--neon); opacity: 0.8;">LINKING...</div>
        </div>

        <div class="controls-area">
            <input type="text" id="search-input" placeholder="SEARCH_DATABASE..." autocomplete="off">
            <button class="btn-tactic btn-white shine-effect" onclick="launchRandom()">RANDOM_NODE</button>
            <div class="slider-wrap">
                <span>ALL</span>
                <label class="switch">
                    <input type="checkbox" id="fav-toggle" onchange="toggleFavsOnly()">
                    <span class="slider"></span>
                </label>
                <span>PINNED</span>
            </div>
        </div>

        <div id="grid" class="grid-container"></div>
    </div>

    <div id="theater">
        <div class="theater-head">
            <span id="active-title" style="color: var(--neon); font-size: 12px;">READY</span>
            <div style="display:flex; gap:12px;">
                <button class="btn-tactic btn-white shine-effect" onclick="reloadActiveNode()">REBOOT</button>
                <button class="btn-tactic shine-effect" onclick="toggleFullScreen()">FULL_SCREEN</button>
                <button class="btn-tactic btn-exit shine-effect" onclick="closeGame()">TERMINATE</button>
            </div>
        </div>
        <div class="theater-body">
            <div id="loader" class="loader-ui" style="display:none;">
                <div class="bar-container"><div id="bar" class="bar-fill"></div></div>
                <div id="loader-msg" class="msg-text">INITIALIZING...</div>
                <div id="stream-monitor" class="stream-monitor"></div>
            </div>
            <div id="iframe-host" style="width:100%; height:100%;"></div>
        </div>
    </div>

    <script>
        const JSON_URL = "./games.json"; 
        let db = [];
        let favorites = JSON.parse(localStorage.getItem('galactic_favs') || '[]');
        let showFavsOnly = false;
        let activeGame = null;
        let bannerManuallyClosed = false;
        const numFormat = new Intl.NumberFormat();

        async function init() {
            try {
                const response = await fetch(JSON_URL);
                db = await response.json();
                renderGrid(db);
                document.getElementById('node-count').innerText = `LOADED ${db.length} GAMES!`;
                setTimeout(() => document.getElementById('splash').classList.add('hidden'), 1000);
            } catch (e) { document.getElementById('splash-msg').innerText = "DATABASE_SYNC_FAILURE"; }
        }

        function dismissBanner(manual = false) {
            const banner = document.getElementById('top-banner');
            const wrap = document.getElementById('main-wrap');
            if (banner) banner.classList.add('stealth');
            if (wrap) wrap.classList.add('full');
            if (manual) bannerManuallyClosed = true;
        }

        function restoreBanner() {
            if (bannerManuallyClosed) return;
            const banner = document.getElementById('top-banner');
            const wrap = document.getElementById('main-wrap');
            if (banner) banner.classList.remove('stealth');
            if (wrap) wrap.classList.remove('full');
        }

        function renderGrid(data) {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            data.forEach(game => {
                const isFav = favorites.includes(game.name);
                if (showFavsOnly && !isFav) return;
                const card = document.createElement('div');
                card.className = `game-card shine-effect ${isFav ? 'favorite' : ''}`;
                const pinText = isFav ? '<div class="pin-status">NODE_PINNED</div>' : '';
                card.innerHTML = `<div class="fav-star">★</div><div class="game-name">${game.name}</div><div class="part-tag">${game.parts > 0 ? game.parts + '_PARTS' : 'SINGLE_NODE'}</div>${pinText}`;
                card.onclick = (e) => {
                    if (e.target.classList.contains('fav-star')) toggleFav(game.name);
                    else launchGame(game);
                };
                grid.appendChild(card);
            });
        }

        function toggleFav(name) {
            favorites = favorites.includes(name) ? favorites.filter(n => n !== name) : [...favorites, name];
            localStorage.setItem('galactic_favs', JSON.stringify(favorites));
            renderGrid(db);
        }

        function toggleFavsOnly() {
            showFavsOnly = document.getElementById('fav-toggle').checked;
            renderGrid(db);
        }

        async function fetchPart(url, filename) {
            const monitor = document.getElementById('stream-monitor');
            const item = document.createElement('div');
            item.className = 'stream-item active';
            item.innerHTML = `<span>> LOADING: ${filename}</span><span class="val">0 B</span>`;
            monitor.appendChild(item);
            monitor.scrollTop = monitor.scrollHeight;

            const res = await fetch(url);
            const reader = res.body.getReader();
            let chunks = []; let received = 0;
            while(true) {
                const {done, value} = await reader.read();
                if(done) break;
                chunks.push(value);
                received += value.length;
                item.querySelector('.val').innerText = numFormat.format(received) + " B";
            }
            item.className = 'stream-item complete';
            item.innerHTML = `<span>> ${filename}</span><span>UPLINK_SUCCESS ✓</span>`;
            return await (new Blob(chunks)).text();
        }

        async function launchGame(game) {
            activeGame = game;
            dismissBanner(); 
            const theater = document.getElementById('theater');
            const loader = document.getElementById('loader');
            const bar = document.getElementById('bar');
            const msg = document.getElementById('loader-msg');
            const host = document.getElementById('iframe-host');
            const title = document.getElementById('active-title');
            
            theater.style.display = 'flex';
            setTimeout(() => theater.classList.add('active'), 10);
            loader.style.display = 'flex';
            host.innerHTML = '';
            document.getElementById('stream-monitor').innerHTML = '';
            const filename = game.url.split('/').pop();
            title.innerText = `PLAYING: ${game.name}`;

            try {
                let code = "";
                if (game.parts === 0) {
                    bar.className = "bar-fill kinetic-slide";
                    msg.innerText = `STREAMING_NODE: ${filename}`;
                    code = await fetchPart(game.url, filename);
                } else {
                    bar.className = "bar-fill";
                    bar.style.width = "0%";
                    const promises = [];
                    let finished = 0;
                    for (let i = 1; i <= game.parts; i++) {
                        const partName = `${filename}.PART${i}`;
                        promises.push(fetchPart(`${game.url}.part${i}`, partName).then(txt => {
                            finished++;
                            bar.style.width = (finished / game.parts * 100) + "%";
                            msg.innerText = `RECONSTRUCTING: ${filename}`;
                            return txt;
                        }));
                    }
                    code = (await Promise.all(promises)).join('');
                }

                // --- GADGET DECODER PROTOCOL ---
                // If it looks like an XML Module/Gadget
                if (code.includes('<Module>')) {
                    console.log("XML_GADGET_DETECTED: INITIATING_DECODER");
                    // 1. Extract content from inside CDATA
                    let cdataMatch = code.match(/<!\[CDATA\[([\s\S]*?)\]\]>/);
                    if (cdataMatch) {
                        code = cdataMatch[1];
                    }

                    // 2. Hunt for the real SWF URL
                    let swfMatch = code.match(/https?:\/\/[^"']+\.swf/);
                    if (swfMatch) {
                        const realSwfUrl = swfMatch[0];
                        // 3. Replace all $1 placeholders with the real link
                        code = code.replace(/\$1/g, realSwfUrl);
                    }
                }

                const iframe = document.createElement('iframe');
                iframe.setAttribute('allow', 'cross-origin-isolated; fullscreen; autoplay; pointer-lock');
                host.appendChild(iframe);
                const doc = iframe.contentWindow.document;
                doc.open();
                doc.write('<style>body,html{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#000;display:flex;justify-content:center;align-items:center;}canvas,iframe,embed,object{max-width:100%;max-height:100%;object-fit:contain;}</style>');
                doc.write(code);
                doc.close();
                setTimeout(() => { loader.style.display = 'none'; }, 800);
            } catch (err) { msg.innerText = "UPLINK_FAILURE"; }
        }

        function closeGame() {
            const theater = document.getElementById('theater');
            theater.classList.remove('active');
            setTimeout(() => { theater.style.display = 'none'; document.getElementById('iframe-host').innerHTML = ''; activeGame = null; restoreBanner(); }, 500);
        }

        function launchRandom() { launchGame(db[Math.floor(Math.random() * db.length)]); }
        function reloadActiveNode() { if(activeGame) launchGame(activeGame); }
        function toggleFullScreen() {
            const host = document.getElementById('iframe-host');
            if (host.requestFullscreen) host.requestFullscreen();
        }

        document.getElementById('search-input').oninput = (e) => {
            renderGrid(db.filter(g => g.name.toLowerCase().includes(e.target.value.toLowerCase())));
        };

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function initP(){
            canvas.width=window.innerWidth; canvas.height=window.innerHeight;
            pts=[]; for(let i=0;i<60;i++) pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.2,vy:(Math.random()-0.5)*0.2});
        }
        function drawP(){
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#00f2ff"; ctx.strokeStyle="rgba(0, 242, 255, 0.08)";
            pts.forEach((p,idx)=>{
                p.x+=p.vx; p.y+=p.vy; if(p.x<0||p.x>canvas.width)p.vx*=-1; if(p.y<0||p.y>canvas.height)p.vy*=-1;
                ctx.beginPath(); ctx.arc(p.x,p.y,1,0,Math.PI*2); ctx.fill();
                for(let j=idx+1;j<pts.length;j++){
                    let d=Math.hypot(p.x-pts[j].x,p.y-pts[j].y);
                    if(d<200){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(pts[j].x,pts[j].y); ctx.stroke(); }
                }
            }); requestAnimationFrame(drawP);
        }
        window.onresize=initP; initP(); drawP();
        init();
    </script>
</body>
</html>
